<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset=""UTF-8 />
        <title>Snake React</title>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <style>
            body {
                margin: 0;
                background: #111;
                color: white;
                font-family: Arial;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(20, 20px);
                grid-template-rows: repeat(20, 20px);
                gap: 1px;
                background: #222;
                padding: 10px;
            }

            .cell {
                width: 20px;
                height: 20px;
                background: #333;
            }

            .snake {
                background: lime;
            }

            .food { 
                background: red;
            }

            .score { 
                margin-bottom: 10px;
            }

            .game-over { 
                margin-top: 10px;
                color: red;
                font-weight: bold;
            }

            button {
                margin-top: 10px;
                padding: 8px;
                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <div id="root"></div>
        <script type="text/babel">
            const SIZE = 20;

            function getRandomCell() {
                return {
                    x: Math.floor(Math.random() * SIZE),
                    y: Math.floor(Math.random() * SIZE)
                };
            }

            function Score({ score }) {
                return <div className="score">Score: {score}</div>;
            }

            function Food({ food }) {
                return (
                    <div 
                        className="cell food"
                        style={{
                            gridColumn: food.x + 1,
                            gridRow: food.y + 1
                        }}
                    />
                );
            }

            function Snake({ snake }){
                return snake.map((segment, i) => (
                    <div 
                        key = {1}
                        className = "cell snake"
                        style = {{
                            gridColumn: segment.x + 1,
                            gridRow: segment.y + 1
                        }}
                    />
                ));
            }

            function Board({ snake, food }) {
                return (
                    <div className="board">
                        <Snake snake={snake} />
                        <Food food={food} />
                    </div>
                );
            }

            function App(){
                const [snake, setSnake] = React.useState([
                    { x: 10, y: 10 }
                ]);

                const[direction, setDirection] = React.useState("RIGHT");

                React.useEffect(() => {
                    const handleKey = (e) => {
                        switch (e.key){
                            case "ArrowUp":
                                setDirection("UP");
                                break;
                            case "ArrowDown":
                                setDirection("DOWN");
                                break;
                            case "ArrowLeft":
                                setDirection("LEFT");
                                break;
                            case "ArrowRight":
                                setDirection("RIGHT");
                                break;
                        }
                    };
                    window.addEventListener("keydown", handleKey);
                    return () => window.removeEventListener("keydown", handleKey);
                }, []);

                const restart = () => {
                    setSnake([{ x: 10, y: 10 }]);
                    setDirection("RIGHT");
                };

                return (
                    <div>
                        <Board snake = {snake} />
                    </div>
                );
            }
        </script>
    </body>
</html>
