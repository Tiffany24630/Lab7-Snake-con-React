<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Snake React</title>

        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <style>
            body {
                margin: 0;
                background: #111;
                color: white;
                font-family: Arial;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(20, 20px);
                grid-template-rows: repeat(20, 20px);
                gap: 1px;
                background: #222;
                padding: 10px;
            }

            .cell {
                width: 20px;
                height: 20px;
                background: #333;
            }

            .snake {
                background: lime;
            }

            .food { 
                background: red;
                border-radius: 50%;
            }

            .score { 
                margin-bottom: 10px;
            }

            .game-over { 
                margin-top: 10px;
                color: red;
                font-weight: bold;
            }

            button {
                margin-top: 10px;
                padding: 8px;
                cursor: pointer;
            }

            .title {
                font-size: 24px;
                margin-bottom: 20px;
                color: limegreen;
            }
        </style>
    </head>

    <body>
    <div id="root"></div>

    <script type="text/babel">
    const SIZE = 20;

    function getRandomCell() {
        return {
            x: Math.floor(Math.random() * SIZE),
            y: Math.floor(Math.random() * SIZE)
        };
    }

    function Score({ score }) {
        return <div className="score">Score: {score}</div>;
    }

    function Food({ food }) {
        return (
            <div 
                className="cell food"
                style={{
                    gridColumn: food.x + 1,
                    gridRow: food.y + 1
                }}
            />
        );
    }

    function Snake({ snake }){
        return snake.map((segment, i) => (
            <div 
                key={i}
                className="cell snake"
                style={{
                    gridColumn: segment.x + 1,
                    gridRow: segment.y + 1
                }}
            />
        ));
    }

    function Board({ snake, food }) {
        return (
            <div className="board">
                <Snake snake={snake} />
                <Food food={food} />
            </div>
        );
    }

    function App(){
        const [snake, setSnake] = React.useState([{ x: 10, y: 10 }]);
        const [direction, setDirection] = React.useState("RIGHT");
        const [food, setFood] = React.useState(getRandomCell()); 
        const [score, setScore] = React.useState(0); 
        const [gameOver, setGameOver] = React.useState(false); 

        React.useEffect(() => {
            const handleKey = (e) => {
                setDirection(prev => {
                    switch (e.key){
                        case "ArrowUp": return prev !== "DOWN" ? "UP" : prev;
                        case "ArrowDown": return prev !== "UP" ? "DOWN" : prev;
                        case "ArrowLeft": return prev !== "RIGHT" ? "LEFT" : prev;
                        case "ArrowRight": return prev !== "LEFT" ? "RIGHT" : prev;
                        default: return prev;
                    }
                });
            };
            window.addEventListener("keydown", handleKey);
            return () => window.removeEventListener("keydown", handleKey);
        }, []);

        React.useEffect(() => {
            if(gameOver) return;

            const interval = setInterval(() => {
                setSnake(prev => {
                    const head = { ...prev[0] };

                    switch (direction) {
                        case "UP": head.y -= 1; break;
                        case "DOWN": head.y += 1; break;
                        case "LEFT": head.x -= 1; break;
                        case "RIGHT": head.x += 1; break;
                    }

                    if (
                        head.x < 0 || head.x >= SIZE ||
                        head.y < 0 || head.y >= SIZE ||
                        prev.some(seg => seg.x === head.x && seg.y === head.y)
                    ) {
                        setGameOver(true);
                        return prev;
                    }

                    let newSnake = [head, ...prev];

                    if (head.x === food.x && head.y === food.y) {
                        setFood(getRandomCell());
                        setScore(s => s + 1);
                    } else {
                        newSnake.pop();
                    }

                    return newSnake;
                });
            }, 150);

            return () => clearInterval(interval);
        }, [direction, food, gameOver]);

        const restart = () => {
            setSnake([{ x: 10, y: 10 }]);
            setDirection("RIGHT");
            setFood(getRandomCell()); 
            setScore(0); 
            setGameOver(false); 
        };

        return (
            <div>
                <div className="title">SnakeGame</div>
                <Score score={score} />
                <Board snake={snake} food={food} />

                {gameOver && ( 
                    <div className="game-over">
                        Game Over
                        <br />
                        <button onClick={restart}>Reiniciar</button>
                    </div>
                )}
            </div>
        );
    }
        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>

    </body>
</html>
